<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><img src="images/05.png" alt="Логотип" class="logo"></a>
        <div class="nav-links">
            <a href="create.html">Создать заявку</a>
            <a href="#" onclick="logout()">Выйти</a>
        </div>
    </nav>

    <div class="container">
        <h2>Личный кабинет</h2>
        
        <div class="slider-container">
            <button class="slider-btn left" onclick="changeSlide(-1)">❮</button>
            <img src="images/1.jpg" id="slide" class="slider-img" alt="слайд">
            <button class="slider-btn right" onclick="changeSlide(1)">❯</button>
        </div>

        <h3>Мои заявки</h3>
        <div id="my-bookings"><p>Загрузка заявок...</p></div>
    </div>

    <div class="modal-overlay" id="reviewOverlay">
        <div class="modal">
            <h2>Отзыв о банкете</h2>
            <textarea id="reviewText" rows="4" placeholder="Поделитесь вашими впечатлениями..."></textarea>
            <input type="hidden" id="reviewBookingId">
            <input type="hidden" id="existingReviewId">
            <button onclick="submitReview()">Сохранить</button>
            <button class="btn-secondary" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <footer class="footer">
        <div>
            <p>г. Москва, ул. Большая Ордынка, д. 15 | +7 (495) 123-45-67</p>
        </div>
        <div class="social-icons">
            <a href="#"><img src="social/vk.png" alt="ВК"></a>
            <a href="#"><img src="social/ok.png" alt="Одноклассники"></a>
        </div>
    </footer>
    <div id="toast" class="toast">сообщение</div>

    <script src="js/app.js"></script>
  <script>
        let cur = 1;
        function changeSlide(dir) {
            cur += dir;
            if (cur > 4) cur = 1;
            if (cur < 1) cur = 4;
            document.getElementById('slide').src = `images/${cur}.jpg`;
        }
        setInterval(() => changeSlide(1), 3000);

        async function loadBookings() {
            const userId = localStorage.getItem('userId');
            if(!userId) return window.location.href = 'auth.html';

            try {
                const res = await fetch('/api/bookings/user/' + userId);
                const data = await res.json();
                const container = document.getElementById('my-bookings');
                
                if(data.length === 0) {
                    container.innerHTML = '<p class="subtext">У вас пока нет заявок.</p>';
                    return;
                }

                container.innerHTML = '';
                data.forEach(b => {
                    const date = new Date(b.start_date).toLocaleDateString('ru-RU');
                    const revText = (b.review && b.review !== 'null') ? b.review : '';
                    const reviewShow = revText ? `<p class="subtext">Ваш отзыв: ${revText}</p>` : '';
                    
                    let reviewBtn = '';
                    if (b.status !== 'Новая') {
                        reviewBtn = `<button onclick="openReviewModal(${b.id}, this)" data-text="${revText}">${revText ? 'Изменить отзыв' : 'Оставить отзыв'}</button>`;
                    }

                    container.innerHTML += `
                        <div class="booking-card">
                            <div class="booking-info">
                                <h3>${b.hall_name}</h3>
                                <p>Дата: ${date} | Оплата: ${b.payment_method}</p>
                                <p>Статус: <strong style="color: var(--crimson)">${b.status}</strong></p>
                                ${reviewShow}
                            </div>
                            <div class="booking-actions">${reviewBtn}</div>
                        </div>
                    `;
                });
            } catch(e) { console.error(e); }
        }

        function openReviewModal(id, btnElement) {
            document.getElementById('reviewBookingId').value = id;
            document.getElementById('reviewText').value = btnElement.getAttribute('data-text');
            document.getElementById('reviewOverlay').style.display = 'block';
        }
        function closeModal() { document.getElementById('reviewOverlay').style.display = 'none'; }

        async function submitReview() {
            const id = document.getElementById('reviewBookingId').value;
            const text = document.getElementById('reviewText').value;
            try {
                const res = await fetch(`/api/bookings/${id}/review`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ review: text })
                });
                if(res.ok) {
                    showToast('Отзыв сохранен!', 'success');
                    closeModal();
                    loadBookings();
                }
            } catch(e) { showToast('Ошибка при сохранении'); }
        }

        loadBookings();
    </script>
</body>
</html>
