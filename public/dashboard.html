<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
        <a href="index.html" class="brand">
            <img src="images/05.png" alt="Лого" class="logo">
            <span class="brand-title">Банкетам.Нет</span>
        </a>
        <div class="menu-toggle" id="menu-toggle">
            <i class="bi bi-list"></i>
        </div>
        <div class="nav-links" id="nav-menu"></div>
    </nav>

    <div class="container">
        <h2>Личный кабинет</h2>
        <div class="slider-container">
            <button class="slider-btn left" onclick="changeSlide(-1)">❮</button>
            <img src="images/1.jpg" id="slide" class="slider-img" alt="Слайд">
            <button class="slider-btn right" onclick="changeSlide(1)">❯</button>
        </div>
        <h3>Мои заявки</h3>
        <div id="my-bookings"><p>Загрузка...</p></div>
    </div>

    <div class="modal-overlay" id="reviewOverlay">
        <div class="modal">
            <h2>Отзыв</h2>
            <textarea id="reviewText" rows="4"></textarea>
            <input type="hidden" id="reviewBookingId">
            <button onclick="submitReview()">Сохранить</button>
            <button class="btn-secondary" style="background:#aaa; margin-top:10px;" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <footer class="footer">
        <div><p>© 2026 Банкетам.Нет.</p></div>
        <div class="social-icons"><a href="#"><img src="social/soc.png" alt="Соцсети"></a></div>
    </footer>
    <div id="toast" class="toast"></div>

    <script src="js/app.js"></script>
    <script>
        let cur = 1; setInterval(() => { cur = cur > 3 ? 1 : cur + 1; document.getElementById('slide').src = `images/${cur}.jpg`; }, 3000);
        function changeSlide(dir) { cur += dir; if(cur>4) cur=1; if(cur<1) cur=4; document.getElementById('slide').src = `images/${cur}.jpg`; }
        
        async function loadBookings() {
            const userId = localStorage.getItem('userId');
            if(!userId) return window.location.href = 'auth.html';
            try {
                const res = await fetch('/api/bookings/user/' + userId); const data = await res.json();
                const container = document.getElementById('my-bookings'); container.innerHTML = '';
                if(data.length === 0) return container.innerHTML = '<p>У вас пока нет заявок.</p>';
                data.forEach(b => {
                    const date = new Date(b.start_date).toLocaleDateString('ru-RU');
                    const revText = (b.review && b.review !== 'null') ? b.review : '';
                    const reviewShow = revText ? `<div class="review-box"><p class="subtext" style="margin:0;"><i class="bi bi-chat-quote-fill"></i> "${revText}"</p></div>` : '';
                    let reviewBtn = b.status !== 'Новая' ? `<button onclick="openReviewModal(${b.id}, this)" data-text="${revText}"><i class="bi bi-pencil-square"></i> Отзыв</button>` : '';
                    container.innerHTML += `<div class="booking-card"><div class="booking-info"><h3><i class="bi bi-shop"></i> ${b.hall_name}</h3><p><i class="bi bi-calendar-event"></i> ${date} | <i class="bi bi-credit-card"></i> ${b.payment_method}</p><p><i class="bi bi-info-circle"></i> Статус: <strong style="color:var(--crimson)">${b.status}</strong></p>${reviewShow}</div><div class="booking-actions">${reviewBtn}</div></div>`;
                });
            } catch(e) { console.error(e); }
        }
        function openReviewModal(id, btn) { document.getElementById('reviewBookingId').value = id; document.getElementById('reviewText').value = btn.getAttribute('data-text'); document.getElementById('reviewOverlay').style.display = 'block'; }
        function closeModal() { document.getElementById('reviewOverlay').style.display = 'none'; }
        async function submitReview() {
            const id = document.getElementById('reviewBookingId').value; const text = document.getElementById('reviewText').value;
            try { const res = await fetch(`/api/bookings/${id}/review`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ review: text }) });
                if(res.ok) { showToast('Отзыв сохранен!', 'success'); closeModal(); loadBookings(); }
            } catch(e) {}
        }
        loadBookings();
    </script>
</body>
</html>
