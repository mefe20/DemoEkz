<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><img src="images/05.png" alt="логотип" class="logo"></a>
        <div class="nav-links">
            <a href="dashboard.html">Назад в кабинет</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>Оформление заявки</h2>
            <form onsubmit="createBooking(event)">
                <select id="hall_id" required>
                    <option value="" disabled selected>Выберите помещение</option>
                    <option value="1">Зал</option>
                    <option value="2">Ресторан</option>
                    <option value="3">Летняя веранда</option>
                    <option value="4">Закрытая веранда</option>
                </select>
                <input type="date" id="start_date" required>
                <select id="payment_method" required>
                    <option value="" disabled selected>Способ оплаты</option>
                    <option value="Оплата картой">Оплата картой</option>
                    <option value="Наличные">Наличные</option>
                </select>
                <button type="submit">Отправить заявку</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">сообщение</div>

    <script src="js/app.js"></script>
</body>
</html>
