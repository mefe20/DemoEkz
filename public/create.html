<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заявки</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar"><a href="index.html"><img src="images/05.png" class="logo"></a><div class="nav-links"><a href="dashboard.html">Назад</a></div></nav>
    <div class="container form-card">
        <h2>Оформление заявки</h2>
        <form onsubmit="createBooking(event)">
            <label class="subtext">Выберите помещение:</label>
            <select id="hall_id" required><option value="" disabled selected>Не выбрано</option><option value="1">Зал</option><option value="2">Ресторан</option><option value="3">Летняя веранда</option><option value="4">Закрытая веранда</option></select>
            <label class="subtext">Дата банкета:</label><input type="date" id="start_date" required>
            <label class="subtext">Способ оплаты:</label>
            <select id="payment_method" required><option value="" disabled selected>Выберите способ оплаты</option><option value="QR-код">Предоплата по QR-коду</option><option value="Карта МИР">Оплата картой МИР</option><option value="Постоплата">Постоплата в офисе</option></select>
            <button type="submit">Отправить заявку</button>
        </form>
    </div>
    <footer class="footer"><p>© 2026 Банкетам.Нет.</p></footer><div id="toast" class="toast"></div><script src="js/app.js"></script>
</body>
</html>
