<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><img src="images/05.png" alt="Логотип" class="logo"></a>
        <div class="nav-links"><a href="dashboard.html">Назад в кабинет</a></div>
    </nav>

    <div class="container form-card">
        <h2>Оформление заявки</h2>
        <form onsubmit="createBooking(event)">
            <label class="subtext">Выберите помещение:</label>
            <select id="hall_id" required>
                <option value="" disabled selected>Не выбрано</option>
                <option value="1">Зал</option>
                <option value="2">Ресторан</option>
                <option value="3">Летняя веранда</option>
                <option value="4">Закрытая веранда</option>
            </select>
            
            <label class="subtext">Дата банкета (ДД.ММ.ГГГГ):</label>
            <input type="date" id="start_date" required>
            
            <label class="subtext">Способ оплаты:</label>
            <select id="payment_method" required>
                <option value="" disabled selected>Выберите способ оплаты</option>
                <option value="предоплата по QR-коду">Предоплата по QR-коду</option>
                <option value="оплата картой МИР">Оплата картой МИР</option>
                <option value="постоплата в офисе организации">Постоплата в офисе</option>
            </select>
            
            <button type="submit">Отправить заявку</button>
        </form>
    </div>

    <footer class="footer">
        <div>
            <p>г. Москва, ул. Большая Ордынка, д. 15 | +7 (495) 123-45-67</p>
            <p>© 2026 Банкетам.Нет.</p>
        </div>
        <div class="social-icons">
            <a href="#"><img src="social/vk.png" alt="ВК"></a>
            <a href="#"><img src="social/ok.png" alt="Одноклассники"></a>
        </div>
    </footer>
    <div id="toast" class="toast">сообщение</div>

    <script src="js/app.js"></script>
</body>
</html>
