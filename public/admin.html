<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панель</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar"><a href="index.html"><img src="images/05.png" class="logo" alt="Лого"></a><div class="nav-links"><a href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Выйти</a></div></nav>
    <div class="container">
        <h2>Управление заявками</h2>
        <div class="admin-filters">
            <input type="text" id="searchInput" placeholder="Поиск по клиенту..." oninput="loadAdminBookings()">
            <select id="statusFilter" onchange="loadAdminBookings()">
                <option value="all">Все статусы</option><option value="Новая">Новая</option><option value="Банкет назначен">Банкет назначен</option><option value="Банкет завершен">Банкет завершен</option>
            </select>
            <select id="hallFilter" onchange="loadAdminBookings()">
                <option value="all">Все залы</option><option value="Зал">Зал</option><option value="Ресторан">Ресторан</option><option value="Летняя веранда">Летняя веранда</option><option value="Закрытая веранда">Закрытая веранда</option>
            </select>
            <button id="sortBtn" onclick="toggleSort()" style="width: auto; padding: 12px 20px;"><i class="bi bi-sort-down"></i> Сначала новые</button>
        </div>
        <div id="admin-list"><p>Загрузка...</p></div>
    </div>
    <footer class="footer"><p>© 2026 Банкетам.Нет.</p></footer><div id="toast" class="toast"></div><script src="js/app.js"></script>
    <script>
        if(localStorage.getItem('role') !== 'admin') window.location.href = 'index.html';
        
        let sortDesc = true; // по умолчанию сначала новые

        function toggleSort() {
            sortDesc = !sortDesc;
            document.getElementById('sortBtn').innerHTML = sortDesc ? '<i class="bi bi-sort-down"></i> Сначала новые' : '<i class="bi bi-sort-up"></i> Сначала старые';
            loadAdminBookings();
        }

        async function loadAdminBookings() {
            try {
                const res = await fetch('/api/admin/bookings', { headers: getAuthHeaders() }); let data = await res.json();
                const search = document.getElementById('searchInput').value.toLowerCase();
                const statusF = document.getElementById('statusFilter').value;
                const hallF = document.getElementById('hallFilter').value;

                if(search) data = data.filter(b => b.full_name.toLowerCase().includes(search));
                if(statusF !== 'all') data = data.filter(b => b.status === statusF);
                if(hallF !== 'all') data = data.filter(b => b.room_name === hallF);

                // Применяем сортировку
                data.sort((a, b) => {
                    const dateA = new Date(a.event_date).getTime();
                    const dateB = new Date(b.event_date).getTime();
                    return sortDesc ? dateB - dateA : dateA - dateB;
                });

                const container = document.getElementById('admin-list'); container.innerHTML = '';
                if(data.length === 0) return container.innerHTML = '<p>Заявок не найдено.</p>';

                data.forEach(b => {
                    const date = new Date(b.event_date).toLocaleDateString('ru-RU');
                    const rev = (b.review_text && b.review_text !== 'null') ? `<div class="review-box"><p class="subtext" style="margin:0;"><i class="bi bi-chat-left-text"></i> Отзыв: ${b.review_text}</p></div>` : '';
                    container.innerHTML += `<div class="booking-card"><div class="booking-info"><h3>Заявка #${b.id} — <i class="bi bi-shop"></i> ${b.room_name}</h3><p><i class="bi bi-person-fill"></i> Клиент: <strong>${b.full_name}</strong> (${b.phone})</p><p><i class="bi bi-calendar-event"></i> Дата: ${date} | <i class="bi bi-credit-card"></i> Оплата: ${b.payment_method}</p><p><i class="bi bi-info-circle"></i> Статус: <strong style="color: var(--crimson)">${b.status}</strong></p>${rev}</div><div class="booking-actions"><select onchange="updateStatus(${b.id}, this.value)"><option value="" disabled selected>Сменить статус</option><option value="Новая">Новая</option><option value="Банкет назначен">Банкет назначен</option><option value="Банкет завершен">Банкет завершен</option></select></div></div>`;
                });
            } catch(e) { console.error(e); }
        }
        
        async function updateStatus(id, newStatus) {
            try { const res = await fetch(`/api/admin/bookings/${id}/status`, { method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify({ status: newStatus }) });
                if(res.ok) { showToast('Статус обновлен!', 'success'); loadAdminBookings(); }
            } catch(e) {}
        }
        loadAdminBookings();
    </script>
</body>
</html>
